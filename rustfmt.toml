# Rust formatter configuration for the UberMetroid companion apps.
# Kept intentionally minimal; overridable per-crate if needed.

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
format_code_in_doc_comments = false
format_strings = false
normalize_comments = false
normalize_doc_attributes = false
wrap_comments = false