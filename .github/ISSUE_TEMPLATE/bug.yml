name: Bug report
description: Daemon, CLI, TUI, applet, or packaging problem
title: "[bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - trance-daemon
        - trance CLI
        - trance-tui
        - trance-applet (COSMIC)
        - packaging (deb/rpm/systemd)
        - D-Bus / idle
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "trance version / package version"
    validations:
      required: false
  - type: input
    id: desktop
    attributes:
      label: Desktop / distro
      placeholder: "e.g. COSMIC on Pop!_OS, Fedora 42 + Hyprland"
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "e.g. journalctl --user -u trance-daemon -b --no-pager | tail -100"
    validations:
      required: false
