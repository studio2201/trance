# CI for UberMetroid/trance
# Requires: Actions allow GitHub-owned actions (checkout, cache).
# Required status checks on main: "Security advisories" and "Tests".
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_DENY_VERSION: "0.20.2"

jobs:
  advisories:
    name: Security advisories
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache cargo registry + deny binary
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-deny-${{ env.CARGO_DENY_VERSION }}-${{ hashFiles('**/Cargo.lock', 'deny.toml') }}
          restore-keys: |
            ${{ runner.os }}-deny-${{ env.CARGO_DENY_VERSION }}-
            ${{ runner.os }}-deny-

      - name: Install Rust (from rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # Installs the pin in rust-toolchain.toml
          rustup show
          rustc --version
          cargo --version

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install cargo-deny --locked --version "${CARGO_DENY_VERSION}"
          else
            cargo-deny --version
          fi

      - name: cargo deny check advisories
        run: cargo deny check advisories

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev pkg-config \
            libwayland-dev libxkbcommon-dev \
            libssl-dev

      - name: Cache cargo + build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-

      - name: Install Rust (from rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup show
          rustc --version

      # Skip trance-applet: optional COSMIC UI, huge libcosmic/wgpu build.
      - name: cargo test (core + tui + cli)
        run: |
          cargo test \
            -p trance-api \
            -p trance-runner \
            -p trance-dbus \
            -p trance-upscaler \
            -p wayland-idle \
            -p wayland-present \
            -p trance-daemon \
            -p trance-cli \
            -p trance-tui \
            --all-features
