# CI for crateria/trance
# Requires: Actions allow GitHub-owned actions (checkout, cache).
# Required status checks on main: "Security advisories" and "Tests".
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_DENY_VERSION: "0.20.2"

jobs:
  advisories:
    name: Security advisories
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0

      - name: Install cargo-deny
        run: |
          mkdir -p ~/.cargo/bin
          curl -sSL https://github.com/EmbarkStudios/cargo-deny/releases/download/${{ env.CARGO_DENY_VERSION }}/cargo-deny-${{ env.CARGO_DENY_VERSION }}-x86_64-unknown-linux-musl.tar.gz | tar -xz --strip-components=1 -C ~/.cargo/bin
          chmod +x ~/.cargo/bin/cargo-deny
          cargo-deny --version

      - name: cargo deny check
        run: cargo-deny check

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev pkg-config \
            libwayland-dev libxkbcommon-dev \
            libssl-dev \
            libpam0g-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: cargo clippy fix
        run: cargo clippy --fix --workspace --all-targets --allow-dirty --allow-staged

      - name: cargo fmt
        run: cargo fmt --all

      - name: Commit fmt and clippy --fix changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format and apply clippy fixes"

      - name: Run clippy check
        run: cargo clippy --workspace --all-targets

      # Skip trance-applet: optional COSMIC UI, huge libcosmic/wgpu build.
      - name: cargo test (core + tui + cli)
        run: |
          cargo test \
            -p trance-api \
            -p trance-runner \
            -p trance-dbus \
            -p trance-upscaler \
            -p wayland-idle \
            -p wayland-present \
            -p trance-daemon \
            -p trance-cli \
            -p trance-tui \
            --all-features

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo binstall -y cargo-deb cargo-generate-rpm

      - name: Build release binaries
        run: |
          cargo build --release \
            -p trance-daemon \
            -p trance-cli \
            -p trance-plugins-all \
            -p trance-applet \
            -p trance-tui

      - name: Verify package creation
        run: |
          cargo deb --no-build -p trance-daemon
          cargo deb --no-build -p trance-cli
          cargo deb --no-build -p trance-plugins-all
          cargo deb --no-build -p trance-applet
          cargo deb --no-build -p trance-tui
          cargo generate-rpm -p trance-daemon
          cargo generate-rpm -p trance-cli
          cargo generate-rpm -p trance-plugins-all
          cargo generate-rpm -p trance-applet
          cargo generate-rpm -p trance-tui

      - name: Upload release packages as artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
