# CI for UberMetroid/trance
# Requires repo Actions permission: selected (GitHub-owned + verified allowed).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  advisories:
    name: Security advisories
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version
          cargo --version

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check advisories
        run: cargo deny check advisories

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev pkg-config \
            libwayland-dev libxkbcommon-dev \
            libssl-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustc --version

      # Skip trance-applet: optional COSMIC UI, huge libcosmic/wgpu build.
      - name: cargo test (core + tui + cli)
        run: |
          cargo test \
            -p trance-api \
            -p trance-runner \
            -p trance-dbus \
            -p trance-upscaler \
            -p wayland-idle \
            -p wayland-present \
            -p trance-daemon \
            -p trance-cli \
            -p trance-tui \
            --all-features
