depends = "trance"
recommends = "trance-plugin-bursts, trance-plugin-chaos, trance-plugin-cosmos, trance-plugin-glyphs, trance-plugin-gnats, trance-plugin-storm"
section = "utils"
priority = "optional"
assets = []

[package.metadata.generate-rpm]
name = "trance-plugins-all"
