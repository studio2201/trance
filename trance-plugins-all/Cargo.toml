[package]
name = "trance-plugins-all"
version = "0.2.8"
edition = "2024"
description = "Meta package that recommends all official trance screensaver plugins"
license = "MIT"

[lib]
path = "src/lib.rs"
crate-type = ["rlib"]

[package.metadata.deb]
name = "trance-plugins-all"
