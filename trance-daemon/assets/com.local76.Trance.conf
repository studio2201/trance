<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!--
    Session-bus policy for com.local76.Trance.
    Name ownership is reserved for D-Bus activation (see com.local76.Trance.service).
    Control methods are additionally gated in the daemon by peer executable.
  -->
  <policy context="default">
    <allow own="com.local76.Trance"/>
    <allow send_destination="com.local76.Trance"
           send_interface="com.local76.Trance"/>
    <allow receive_sender="com.local76.Trance"/>
  </policy>
</busconfig>